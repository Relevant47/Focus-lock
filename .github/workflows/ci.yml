name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npx tsc --noEmit
        working-directory: ui

  rust-check:
    name: Rust (Windows target)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - name: Create placeholder daemon binary for cargo check
        run: |
          New-Item -Path ui/src-tauri/resources -ItemType Directory -Force | Out-Null
          if (-not (Test-Path ui/src-tauri/resources/FocusLockDaemon.exe)) {
            New-Item -Path ui/src-tauri/resources/FocusLockDaemon.exe -ItemType File | Out-Null
          }
      - run: cargo check --target x86_64-pc-windows-msvc
        working-directory: ui/src-tauri

  dotnet-build:
    name: .NET daemon (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build -c Release
        working-directory: daemon-win/FocusLock.Daemon

  swift-build:
    name: Swift daemon (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: swift build -c release
        working-directory: daemon-mac
