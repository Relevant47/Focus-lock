name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ── Windows build ────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: ui/src-tauri

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build daemon (Windows)
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -o publish/
        working-directory: daemon-win/FocusLock.Daemon

      - name: Import code signing certificate
        if: env.WINDOWS_CERT_BASE64 != ''
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
          $certPath  = Join-Path $env:TEMP "focuslock.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $cert = Import-PfxCertificate -FilePath $certPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString $env:WINDOWS_CERT_PASSWORD -AsPlainText -Force)
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      - name: Sign daemon binary
        if: env.CERT_THUMBPRINT != ''
        run: |
          & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign `
            /sha1 $env:CERT_THUMBPRINT `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            /d "FocusLock Daemon" `
            "daemon-win\FocusLock.Daemon\publish\FocusLockDaemon.exe"

      - name: Stage daemon binary for Tauri bundle
        run: |
          New-Item -ItemType Directory -Force -Path "ui/src-tauri/resources" | Out-Null
          Copy-Item "daemon-win/FocusLock.Daemon/publish/FocusLockDaemon.exe" "ui/src-tauri/resources/FocusLockDaemon.exe"

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: FocusLock ${{ github.ref_name }}
          releaseBody: |
            ## What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-windows
          path: daemon-win/FocusLock.Daemon/publish/

  # ── macOS build ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-14  # Apple Silicon runner
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: ui/src-tauri

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build daemon (macOS)
        run: swift build -c release
        working-directory: daemon-mac

      - name: Import Apple certificates
        if: env.APPLE_CERT_BASE64 != ''
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo "$APPLE_CERT_BASE64" | base64 --decode > $CERT_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$APPLE_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -p codesigning $KEYCHAIN_PATH

      - name: Sign daemon binary
        if: env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements daemon-mac/entitlements.plist \
            daemon-mac/.build/release/FocusLockDaemon

      - name: Set up SDK root for cross-compilation
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          echo "SDKROOT=$(xcrun -sdk macosx --show-sdk-path)" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=10.13" >> $GITHUB_ENV

      - name: Build Tauri app (macOS)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: FocusLock ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # ── Publish release ───────────────────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Promote draft to published release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const draft = releases.find(r => r.draft && r.tag_name === context.ref.replace('refs/tags/', ''));
            if (draft) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draft.id,
                draft: false,
              });
              console.log(`Published release: ${draft.tag_name}`);
            }
